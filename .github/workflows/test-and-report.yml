name: Test and Report Failures

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *' #for nightly runs
  repository_dispatch:
    types: [be-updated, fe-updated]

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Start services
        run: docker compose up -d
        env:
          BASE_URL: http://localhost:5174
          API_URL: http://localhost:8080

      - name: Wait for services
        run: sleep 15

      - name: Run API tests
        id: api-tests
        continue-on-error: true
        run: |
          pytest api/ -v --json-report --json-report-file=api-report.json
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Run UI tests
        id: ui-tests
        continue-on-error: true
        env:
          BASE_URL: http://localhost:5174
          API_URL: http://localhost:8080
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          cd ui && pytest -v --json-report --json-report-file=../ui-report.json
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Create bug reports on failure
        if: always() && (steps.api-tests.outcome == 'failure' || steps.ui-tests.outcome == 'failure') && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const failures = [];

            try {
              const apiReport = JSON.parse(fs.readFileSync('api-report.json', 'utf8'));
              for (const test of apiReport.tests || []) {
                if (test.outcome === 'failed') {
                  failures.push({
                    name: test.nodeid,
                    message: test.call?.longrepr || test.longrepr || 'No details',
                  });
                }
              }
            } catch (e) {}

            try {
              const uiReport = JSON.parse(fs.readFileSync('ui-report.json', 'utf8'));
              for (const test of uiReport.tests || []) {
                if (test.outcome === 'failed') {
                  failures.push({
                    name: test.nodeid,
                    message: test.call?.longrepr || test.longrepr || 'No details',
                  });
                }
              }
            } catch (e) {}

            if (failures.length === 0) {
              failures.push({ name: 'Unknown', message: 'Tests failed but no JSON report available.' });
            }

            for (const f of failures) {
              const title = `[Test Failure] ${f.name.split('::').pop()}`;
              const { data: existing } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'test-failure',
              });
              const alreadyExists = existing.some(i => i.title === title);
              if (alreadyExists) continue;

              const body = `## Failed test\n\`\`\`\n${f.name}\n\`\`\`\n\n## Error\n\`\`\`\n${String(f.message).slice(0, 60000)}\n\`\`\`\n\n_Generated by CI_`;
              const { data } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'test-failure'],
              });

              const projectId = '${{ vars.PROJECT_ID }}';
              if (projectId && projectId !== '') {
                const mutation = `
                  mutation($projectId: ID!, $contentId: ID!) {
                    addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                      projectV2Item { id }
                    }
                  }
                `;
                await github.graphql(mutation, {
                  projectId,
                  contentId: data.node_id,
                });
              }
            }

name: Test and Report Failures

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' #for nightly runs
  repository_dispatch:
    types: [be-updated, fe-updated]

env:
  PYTHON_VERSION: "3.13"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      repository-projects: write
    steps:
      - uses: actions/checkout@v4

      - name: Get project ID (debug)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            try {
              const userRes = await github.graphql(
                `query($login: String!, $num: Int!) { user(login: $login) { projectV2(number: $num) { id } } }`,
                { login: owner, num: 1 }
              );
              const orgRes = await github.graphql(
                `query($login: String!, $num: Int!) { organization(login: $login) { projectV2(number: $num) { id } } }`,
                { login: owner, num: 1 }
              );
              const userId = userRes?.user?.projectV2?.id;
              const orgId = orgRes?.organization?.projectV2?.id;
              core.info('');
              core.info('=== PROJECT IDs (set PROJECT_ID variable to one of these) ===');
              core.info(`User project 1: ${userId || 'not found'}`);
              core.info(`Org project 1:  ${orgId || 'not found'}`);
              core.info('===========================================================');
            } catch (e) {
              core.warning(`Could not fetch project IDs: ${e.message}`);
            }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Start services
        run: docker compose up -d
        env:
          BASE_URL: http://localhost:5174
          API_URL: http://localhost:8080

      - name: Wait for services
        run: sleep 15

      - name: Run API tests
        id: api-tests
        continue-on-error: true
        env:
          BASE_URL: http://localhost:5174
          API_URL: http://localhost:8080
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          pytest api/ -v --json-report --json-report-file=api-report.json
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Run UI tests
        id: ui-tests
        continue-on-error: true
        env:
          BASE_URL: http://localhost:5174
          API_URL: http://localhost:8080
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          cd ui && pytest -v --json-report --json-report-file=../ui-report.json
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Create bug reports on failure
        if: always() && (steps.api-tests.outcome == 'failure' || steps.ui-tests.outcome == 'failure') && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const failures = [];

            try {
              const apiReport = JSON.parse(fs.readFileSync('api-report.json', 'utf8'));
              for (const test of apiReport.tests || []) {
                if (test.outcome === 'failed' || test.outcome === 'error') {
                  failures.push({
                    name: test.nodeid,
                    message: test.call?.longrepr || test.longrepr || 'No details',
                  });
                }
              }
            } catch (e) {}

            try {
              const uiReport = JSON.parse(fs.readFileSync('ui-report.json', 'utf8'));
              for (const test of uiReport.tests || []) {
                if (test.outcome === 'failed' || test.outcome === 'error') {
                  failures.push({
                    name: test.nodeid,
                    message: test.call?.longrepr || test.longrepr || 'No details',
                  });
                }
              }
            } catch (e) {}

            if (failures.length === 0) {
              const apiFailed = '${{ steps.api-tests.outcome }}' === 'failure';
              const uiFailed = '${{ steps.ui-tests.outcome }}' === 'failure';
              const hint = [apiFailed && 'API', uiFailed && 'UI'].filter(Boolean).join(' + ') || 'Tests';
              failures.push({ name: 'Setup/Import failure', message: `${hint} tests failed but no JSON report available (e.g. ImportError in conftest or before pytest ran).` });
            }

            let projectAddFailures = 0;
            for (const f of failures) {
              const title = `[Test Failure] ${f.name.split('::').pop()}`;
              const { data: existing } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'test-failure',
              });
              const alreadyExists = existing.some(i => i.title === title);
              if (alreadyExists) continue;

              const body = `## Failed test\n\`\`\`\n${f.name}\n\`\`\`\n\n## Error\n\`\`\`\n${String(f.message).slice(0, 60000)}\n\`\`\`\n\n_Generated by CI_`;
              const { data } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'test-failure'],
              });

              const projectId = '${{ vars.PROJECT_ID }}';
              if (projectId && projectId !== '') {
                try {
                  await github.graphql(`
                    mutation($projectId: ID!, $contentId: ID!) {
                      addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) { item { id } }
                    }
                  `, { projectId, contentId: data.node_id });
                } catch (e) {
                  projectAddFailures++;
                  core.warning(`Failed to add issue to project: ${e.message}`);
                }
              }
            }
            if (projectAddFailures > 0) {
              core.setFailed(`Failed to add ${projectAddFailures} issue(s) to project board. Check PROJECT_ID variable.`);
            }
